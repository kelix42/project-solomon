name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          # Optional deps the CI exercises (best-effort install; tests skip if missing)
          pip install spacy watchdog json-logic-qubit imapclient || true
          python -m spacy download en_core_web_sm || true

      - name: Run pytest
        run: pytest tests/ -v
