# belief-system.yaml. Probe library for Onboarding Session 01 (Belief System).
# Schema per probe_library/README.md plus the same two forward-compatible
# additions (probe_style and required_fields) introduced for Session 0.
# Existing readers ignore unknown top-level keys.
#
# Lower priority number wins. Slot {phrase} is replaced verbatim with the
# owner's last phrase. See probe_style for how follow-ups are written.
#
# Semver bump rules (mirror of README.md):
#   patch (0.1.0 to 0.1.1) for new probe templates under existing keywords.
#   minor (0.1.0 to 0.2.0) for new keywords or new required_fields entries.
#   major (0.1.0 to 1.0.0) for breaking schema changes (field rename, removal).

domain: belief-system
version: 0.1.0
priority: 9   # 1 to 10. Beliefs sit underneath every other decision, so this
              # ranks high for cloning judgment.

probe_style: |
  Solomon is a structured reflective listener. The technique borrows from
  Rogerian listening and motivational interviewing, not from 1966 ELIZA's
  canned response tables. The owner's exact phrasing is the raw material.
  Solomon's job: make the owner feel heard enough to keep talking, while
  quietly capturing rules and vocabulary.

  Seven rules:

  1. Use the owner's exact words. Verbatim phrasing must appear in most
     follow-ups. The phrasing IS the data; paraphrasing destroys it. The
     {phrase} substitution must produce sentences where the phrase reads
     naturally, not bolted on.

  2. Do not editorialize. Avoid "is real exposure", "is a real spread",
     "tells me there's a number", "that's interesting". Reflect, do not
     interpret. The owner's frame stands.

  3. The follow-up must build on the echoed phrase. If the new question
     is not about the echoed phrase, do not echo at all. Just ask the new
     question. No fake bridges.

  4. Drop filler. Do not start with "Got it", "Right", "OK", "Interesting",
     "I see", or "That's a good point". Do not use "Tell me more" or
     "Go on". When you need a connective, leave it out and start with
     the echo.

  5. Short is usually better. Echo plus one direct question. No setup,
     no preface, no warm-up.

  6. Follow emotional or evaluative content. When the owner says
     something with feeling or judgment ("that would hurt", "I'm not
     happy about it", "too much liability"), the next question is about
     that, not a pivot away from it.

  7. When pivoting to a new topic, just pivot. Do not invent a verbatim
     phrase to echo just to soften the transition. Ask the new question
     plainly. Required-field prompts in this file are pivots and are
     written that way.

  Continue prompts (use sparingly): "Say more about that.", "Then what?",
  "What happened next?".

required_fields:
  - id: view_on_growth
    prompt: "When you picture the business 3 years out, do you see it as needing to grow, holding steady, or even smaller and tighter on purpose?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:view_on_growth'"
    follow_up_keywords: ["growth-pace"]

  - id: view_on_competition
    prompt: "Do you think of competitors as taking from a fixed pie, growing the pie alongside you, or mostly a non-issue?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:view_on_competition'"
    follow_up_keywords: ["competitor"]

  - id: view_on_employee_relationship
    prompt: "How do you frame your relationship with employees: paycheck for hours, partners in the work, family, or something else?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:view_on_employee_relationship'"
    follow_up_keywords: ["employee"]

  - id: view_on_customer_relationship
    prompt: "And customers: one-and-done, long-term partners, people you teach, or something else?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:view_on_customer_relationship'"
    follow_up_keywords: ["customer-bond"]

  - id: risk_appetite
    prompt: "On risk: would you call yourself averse, measured, or aggressive?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:risk_appetite'"
    follow_up_keywords: ["risk"]

  - id: decision_speed_preference
    prompt: "When a real decision lands on your desk, do you tend to slow down, move fast, or read the situation?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:decision_speed_preference'"
    follow_up_keywords: ["decision-speed"]

  - id: view_on_failure
    prompt: "How do you treat failure: avoid it at all costs, accept it as the cost of learning, or treat it as required for progress?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:view_on_failure'"
    follow_up_keywords: ["failure"]

# 12 keyword clusters covering: money, work, people, customers, competition,
# growth, failure, debt, partnerships, role of business, risk, employees,
# decision speed.
keywords:
  money-belief:
    - priority: 1
      template: "{phrase}. When was the last time that belief got actively tested?"
    - priority: 2
      template: "{phrase}. Has it shifted in the last 5 years?"

  work-belief:
    - priority: 1
      template: "{phrase}. Where did that come from?"
    - priority: 2
      template: "{phrase}. Walk me through a day that confirmed it."

  people-belief:
    - priority: 1
      template: "{phrase}. Who taught you that, or did you arrive at it alone?"
    - priority: 2
      template: "{phrase}. Has anyone ever made you doubt it?"

  customer-bond:
    - priority: 1
      template: "{phrase}. What is the longest customer relationship you have right now?"
    - priority: 2
      template: "{phrase}. When does it work, and when does it not?"

  competitor:
    - priority: 1
      template: "{phrase}. Who do you actually picture when you think of your top competitor?"
    - priority: 2
      template: "{phrase}. When have you actively worked against one?"

  growth-pace:
    - priority: 1
      template: "{phrase}. The last time growth pulled you out of shape: what gave?"
    - priority: 2
      template: "{phrase}. What pace would you actually choose if no one was watching?"

  failure:
    - priority: 1
      template: "{phrase}. The biggest failure that taught you something useful: what was it?"
    - priority: 2
      template: "{phrase}. When have you avoided trying because you might fail?"

  debt:
    - priority: 1
      template: "{phrase}. The first time you took on real debt: how did you decide?"
    - priority: 2
      template: "{phrase}. Where is the line where debt becomes the wrong call?"

  partnership:
    - priority: 1
      template: "{phrase}. The best partnership you have ever had: what made it work?"
    - priority: 2
      template: "{phrase}. The last partnership that ended badly: what was the trigger?"

  role-of-business:
    - priority: 1
      template: "{phrase}. If the business disappeared tomorrow, what about your life would actually change?"
    - priority: 2
      template: "{phrase}. What part of you exists because of this business?"

  risk:
    - priority: 1
      template: "{phrase}. The last big risk you took: how did it turn out?"
    - priority: 2
      template: "{phrase}. What is the riskiest thing you currently do without thinking about it?"

  employee:
    - priority: 1
      template: "{phrase}. The last time an employee surprised you in a good way: what happened?"
    - priority: 2
      template: "{phrase}. The last time you had to set a hard expectation: how did it land?"

  decision-speed:
    - priority: 1
      template: "{phrase}. The last fast decision you got right: what helped?"
    - priority: 2
      template: "{phrase}. The last decision you took your time on: did you regret the patience?"

fallbacks:
  - "Tell me about a belief you used to hold that the work corrected for you."
  - "What is something most people in your industry believe that you do not?"
  - "If you had to teach one belief to a new owner, which would it be?"
  - "When was the last time a belief of yours got into a fight with reality?"
  - "What is a belief you suspect you are wrong about but have not changed yet?"
