# non-negotiables.yaml. Probe library for Onboarding Session 05 (Non-Negotiables).
# Schema per probe_library/README.md plus the same two forward-compatible
# additions (probe_style and required_fields) introduced for Session 0.
# Existing readers ignore unknown top-level keys.
#
# Special note: the matching foundation YAML (foundation/05-non-negotiables.yaml)
# is the ONLY foundation YAML evaluated deterministically by Stage 4 of the
# §2.2.5 pipeline. Session 05's closing checkpoint adds a hard-rule promotion
# sub-step where the owner can elevate any captured non-negotiable into a
# JSON-logic-having hard rule that Stage 4 will enforce. Skipped captures
# remain in captured_items only.
#
# Lower priority number wins. Slot {phrase} is replaced verbatim with the
# owner's last phrase. See probe_style for how follow-ups are written.
#
# Semver bump rules (mirror of README.md):
#   patch (0.1.0 to 0.1.1) for new probe templates under existing keywords.
#   minor (0.1.0 to 0.2.0) for new keywords or new required_fields entries.
#   major (0.1.0 to 1.0.0) for breaking schema changes (field rename, removal).

domain: non-negotiables
version: 0.1.0
priority: 10  # 1 to 10. Hard-rule candidates are the safety floor; this
              # is the highest-priority library in the pack.

probe_style: |
  Solomon is a structured reflective listener. The technique borrows from
  Rogerian listening and motivational interviewing, not from 1966 ELIZA's
  canned response tables. The owner's exact phrasing is the raw material.
  Solomon's job: make the owner feel heard enough to keep talking, while
  quietly capturing rules and vocabulary.

  Seven rules:

  1. Use the owner's exact words. Verbatim phrasing must appear in most
     follow-ups. The phrasing IS the data; paraphrasing destroys it. The
     {phrase} substitution must produce sentences where the phrase reads
     naturally, not bolted on.

  2. Do not editorialize. Avoid "is real exposure", "is a real spread",
     "tells me there's a number", "that's interesting". Reflect, do not
     interpret. The owner's frame stands.

  3. The follow-up must build on the echoed phrase. If the new question
     is not about the echoed phrase, do not echo at all. Just ask the new
     question. No fake bridges.

  4. Drop filler. Do not start with "Got it", "Right", "OK", "Interesting",
     "I see", or "That's a good point". Do not use "Tell me more" or
     "Go on". When you need a connective, leave it out and start with
     the echo.

  5. Short is usually better. Echo plus one direct question. No setup,
     no preface, no warm-up.

  6. Follow emotional or evaluative content. When the owner says
     something with feeling or judgment ("that would hurt", "I'm not
     happy about it", "too much liability"), the next question is about
     that, not a pivot away from it.

  7. When pivoting to a new topic, just pivot. Do not invent a verbatim
     phrase to echo just to soften the transition. Ask the new question
     plainly. Required-field prompts in this file are pivots and are
     written that way.

  Continue prompts (use sparingly): "Say more about that.", "Then what?",
  "What happened next?".

required_fields:
  - id: never_do_to_customers
    prompt: "What is something you will never do to a customer, no matter the upside?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_to_customers'"
    follow_up_keywords: ["customer-line", "customer-line-broken"]

  - id: never_do_with_money
    prompt: "What financial line do you never cross: minimum runway, max debt ratio, anything like that?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_with_money'"
    follow_up_keywords: ["money-line", "runway"]

  - id: never_do_with_employees
    prompt: "What HR line do you never cross with employees: paycheck, schedule, anything else?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_with_employees'"
    follow_up_keywords: ["hr-line", "paycheck"]

  - id: never_do_with_partners_or_vendors
    prompt: "What is off-limits in how you treat partners or vendors?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_with_partners_or_vendors'"
    follow_up_keywords: ["partner-line", "vendor-line"]

  - id: never_do_with_competitors
    prompt: "What is off-limits in how you treat competitors?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_with_competitors'"
    follow_up_keywords: ["competitor-line", "ethics"]

  - id: never_do_personally
    prompt: "What lines do you draw around your own time, your health, your family?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:never_do_personally'"
    follow_up_keywords: ["personal-line", "family-line"]

  - id: line_in_the_sand
    prompt: "If you had to name ONE rule you would quit before breaking, what is it?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:line_in_the_sand'"
    follow_up_keywords: ["line-in-sand", "quit-trigger"]

# 14 keyword clusters. Each required field has a paired follow-up cluster.
keywords:
  customer-line:
    - priority: 1
      template: "{phrase}. The last time someone pushed you toward that line: what did you do?"
    - priority: 2
      template: "{phrase}. The line you would draw even if it cost you the customer?"

  customer-line-broken:
    - priority: 1
      template: "{phrase}. The time you crossed it and regretted it: what was the cost?"

  money-line:
    - priority: 1
      template: "{phrase}. The runway level below which you would stop everything: what is the number?"
    - priority: 2
      template: "{phrase}. The debt level you would never take on: where is it?"

  runway:
    - priority: 1
      template: "{phrase}. The last time runway got tight: what did you cut first?"

  hr-line:
    - priority: 1
      template: "{phrase}. The HR move you would never make even if it saved money: what is it?"
    - priority: 2
      template: "{phrase}. The last time someone tested it: how did it land?"

  paycheck:
    - priority: 1
      template: "{phrase}. The day a paycheck might bounce: what would you cut first?"

  partner-line:
    - priority: 1
      template: "{phrase}. The behavior that ends a partnership for you: what is it?"
    - priority: 2
      template: "{phrase}. The last partnership where this came up: how did you handle it?"

  vendor-line:
    - priority: 1
      template: "{phrase}. The vendor move that gets them fired immediately: what is it?"

  competitor-line:
    - priority: 1
      template: "{phrase}. The thing competitors do that you would never do: what?"
    - priority: 2
      template: "{phrase}. The line you have seen others cross that made you lose respect?"

  ethics:
    - priority: 1
      template: "{phrase}. The ethical move that costs you a deal but you make anyway: when?"

  personal-line:
    - priority: 1
      template: "{phrase}. The personal cost the business will not be allowed to pay: what is it?"
    - priority: 2
      template: "{phrase}. The boundary around your time you guard hardest?"

  family-line:
    - priority: 1
      template: "{phrase}. The family event the business never gets to interrupt: what is it?"

  line-in-sand:
    - priority: 1
      template: "{phrase}. If you broke it, what would you lose that matters more than the business?"
    - priority: 2
      template: "{phrase}. The one thing you would walk away over: how do you describe it to yourself?"

  quit-trigger:
    - priority: 1
      template: "{phrase}. The condition that makes quitting the right move: what is it?"

fallbacks:
  - "Tell me about a line you drew that came from a real mistake."
  - "Tell me about a line you drew from watching someone else fail."
  - "What is something you almost did and stopped: what stopped you?"
  - "What is the rule you wish you had set earlier?"
  - "What is the rule no amount of money would make you bend?"
