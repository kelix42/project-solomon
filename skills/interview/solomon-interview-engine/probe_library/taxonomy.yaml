# taxonomy.yaml. Probe library for Onboarding Session 06 (Taxonomy).
# Schema per probe_library/README.md plus the same two forward-compatible
# additions (probe_style and required_fields) introduced for Session 0.
# Existing readers ignore unknown top-level keys.
#
# Lower priority number wins. Slot {phrase} is replaced verbatim with the
# owner's last phrase. See probe_style for how follow-ups are written.
#
# Semver bump rules (mirror of README.md):
#   patch (0.1.0 to 0.1.1) for new probe templates under existing keywords.
#   minor (0.1.0 to 0.2.0) for new keywords or new required_fields entries.
#   major (0.1.0 to 1.0.0) for breaking schema changes (field rename, removal).

domain: taxonomy
version: 0.1.0
priority: 8   # 1 to 10. Taxonomy seeds scope_autonomy and the entity_allowlist,
              # so it ranks high (just below the foundational hard-rule library).

probe_style: |
  Solomon is a structured reflective listener. The technique borrows from
  Rogerian listening and motivational interviewing, not from 1966 ELIZA's
  canned response tables. The owner's exact phrasing is the raw material.
  Solomon's job: make the owner feel heard enough to keep talking, while
  quietly capturing rules and vocabulary.

  Seven rules:

  1. Use the owner's exact words. Verbatim phrasing must appear in most
     follow-ups. The phrasing IS the data; paraphrasing destroys it. The
     {phrase} substitution must produce sentences where the phrase reads
     naturally, not bolted on.

  2. Do not editorialize. Avoid "is real exposure", "is a real spread",
     "tells me there's a number", "that's interesting". Reflect, do not
     interpret. The owner's frame stands.

  3. The follow-up must build on the echoed phrase. If the new question
     is not about the echoed phrase, do not echo at all. Just ask the new
     question. No fake bridges.

  4. Drop filler. Do not start with "Got it", "Right", "OK", "Interesting",
     "I see", or "That's a good point". Do not use "Tell me more" or
     "Go on". When you need a connective, leave it out and start with
     the echo.

  5. Short is usually better. Echo plus one direct question. No setup,
     no preface, no warm-up.

  6. Follow emotional or evaluative content. When the owner says
     something with feeling or judgment ("that would hurt", "I'm not
     happy about it", "too much liability"), the next question is about
     that, not a pivot away from it.

  7. When pivoting to a new topic, just pivot. Do not invent a verbatim
     phrase to echo just to soften the transition. Ask the new question
     plainly. Required-field prompts in this file are pivots and are
     written that way.

  Continue prompts (use sparingly): "Say more about that.", "Then what?",
  "What happened next?".

required_fields:
  - id: operational_scopes
    prompt: "Solomon defaults to tracking pricing, hiring, ops, customer, vendor, finance. Want to add, rename, or drop any?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:operational_scopes'"
    follow_up_keywords: ["scope-list", "scope-name"]

  - id: decision_type_taxonomy
    prompt: "How do you label decision types yourself: routine, novel, strategic, or your own labels?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:decision_type_taxonomy'"
    follow_up_keywords: ["decision-label", "decision-type"]

  - id: customer_segments_named
    prompt: "What names do you give your customer segments internally?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:customer_segments_named'"
    follow_up_keywords: ["segment-name", "internal-customer"]

  - id: product_or_service_categories
    prompt: "How do you bucket your products or services in your own head?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:product_or_service_categories'"
    follow_up_keywords: ["product-bucket", "service-bucket"]

  - id: vendor_or_supplier_categories
    prompt: "How do you group your vendors or suppliers?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:vendor_or_supplier_categories'"
    follow_up_keywords: ["vendor-group", "supplier-tier"]

  - id: revenue_streams_named
    prompt: "What names do you give your revenue lines internally?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:revenue_streams_named'"
    follow_up_keywords: ["revenue-stream", "revenue-name"]

  - id: internal_jargon_terms
    prompt: "What words mean something specific in your business that an outsider would misread?"
    accepts: ["free_text", "i_dont_know", "not_applicable", "decline_to_answer"]
    satisfied_when: "captured_items row exists with source_session=this AND keywords contains 'field:internal_jargon_terms'"
    follow_up_keywords: ["jargon", "internal-term"]

# 14 keyword clusters. Each required field has a paired follow-up cluster.
keywords:
  scope-list:
    - priority: 1
      template: "{phrase}. Walk me through one decision in each scope you actually track."
    - priority: 2
      template: "{phrase}. The scope you spend the most time on: which one?"

  scope-name:
    - priority: 1
      template: "{phrase}. The label that matches how you actually think about it: what would you change?"

  decision-label:
    - priority: 1
      template: "{phrase}. The last decision that fit one of those labels: which was it?"
    - priority: 2
      template: "{phrase}. The label you use most often: when does it apply?"

  decision-type:
    - priority: 1
      template: "{phrase}. The last decision that did not fit your usual labels: how did you handle it?"

  segment-name:
    - priority: 1
      template: "{phrase}. The last conversation about that segment internally: what came up?"
    - priority: 2
      template: "{phrase}. The segment name an outsider would not understand: what is it?"

  internal-customer:
    - priority: 1
      template: "{phrase}. The customer everyone on your team would recognize by that name: who?"

  product-bucket:
    - priority: 1
      template: "{phrase}. Walk me through one product in each bucket."
    - priority: 2
      template: "{phrase}. The bucket that is growing fastest: which one?"

  service-bucket:
    - priority: 1
      template: "{phrase}. The service that lives across two buckets: how do you decide which one wins?"

  vendor-group:
    - priority: 1
      template: "{phrase}. The vendor group with the most leverage: which one?"
    - priority: 2
      template: "{phrase}. The group you would never single-source from: why?"

  supplier-tier:
    - priority: 1
      template: "{phrase}. The line between tiers: what defines it?"

  revenue-stream:
    - priority: 1
      template: "{phrase}. The stream you talk about with your team most: which?"
    - priority: 2
      template: "{phrase}. The stream you would cut without thinking: why?"

  revenue-name:
    - priority: 1
      template: "{phrase}. The internal name for that stream that does not show up on invoices: what is it?"

  jargon:
    - priority: 1
      template: "{phrase}. The first time someone outside your team heard you say that: did they get it?"
    - priority: 2
      template: "{phrase}. The jargon you avoid in front of customers: what do you say instead?"

  internal-term:
    - priority: 1
      template: "{phrase}. The term you wish more people understood: which one?"

fallbacks:
  - "What is something you call by a name only people inside your business would understand?"
  - "What is a metric you track that nobody else in your industry talks about?"
  - "What is a process step that only exists in your business?"
  - "What is a customer term that never gets used the way customers think it does?"
  - "What is a vendor term that means one thing in industry and another inside here?"
